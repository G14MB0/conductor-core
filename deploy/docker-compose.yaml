version: "3.9"

services:
  dashboard:
    build:
      context: ..
      dockerfile: deploy/dashboard.Dockerfile
    restart: unless-stopped
    environment:
      CONDUCTOR_GLOBAL_CONFIG: /etc/conductor/global.json
      STREAMLIT_SERVER_PORT: 8501
    ports:
      - "8503:8501"
    volumes:
      - ./config:/etc/conductor:ro

  conductor:
    build:
      context: ..
      dockerfile: deploy/conductor.Dockerfile
    restart: unless-stopped
    environment:
      CONDUCTOR_GLOBAL_CONFIG: /etc/conductor/global.json
      # CONDUCTOR_GLOBAL_CONFIG_JSON: |-
      #   {"env": {"EXAMPLE_FLAG": "enabled"}}
      # CONDUCTOR_PIP_EXTRA_ARGS: "--index-url=https://pypi.your-company/internal/simple"
    volumes:
      - ./config:/etc/conductor:ro
      - conductor-cache:/root/.conductor
    # command:
    #   - run
    #   - "--flow"
    #   - "flows://order-routing.json"
    #   - "--runtime-config"
    #   - "/etc/conductor/flows/order-routing.runtime.json"

volumes:
  conductor-cache:
